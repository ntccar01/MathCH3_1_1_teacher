<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數列獵人｜教師戰情室 V3</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC",system-ui,sans-serif;background:#0f172a;color:#f8fafc;overflow-x:hidden}
    .dashboard{min-height:100vh;padding:22px;background:radial-gradient(circle at top left,#1d4ed8,#0f172a 48%),linear-gradient(135deg,#111827,#0f172a)}
    .header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .title{font-size:42px;font-weight:1000;letter-spacing:1px;text-shadow:0 0 18px rgba(96,165,250,.55)}
    .subtitle{color:#cbd5e1;font-size:17px;margin-top:5px}.status{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{background:#1e293b;border:1px solid #334155;border-radius:999px;padding:10px 16px;font-weight:900}.live{background:#dc2626;color:white;animation:pulse 1.3s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.62;transform:scale(1.04)}}
    .refreshBtn,.backupBtn{border:0;font-weight:1000;border-radius:999px;padding:12px 18px;font-size:16px;cursor:pointer}.refreshBtn{background:#22c55e;color:#052e16;box-shadow:0 6px 0 #15803d}.backupBtn{background:#ef4444;color:white;box-shadow:0 6px 0 #991b1b}.refreshBtn:active,.backupBtn:active{transform:translateY(3px);box-shadow:none}
    .grid{display:grid;grid-template-columns:1.12fr .88fr;gap:18px}.card{background:rgba(15,23,42,.9);border:1px solid rgba(148,163,184,.28);border-radius:26px;padding:20px;box-shadow:0 18px 45px rgba(0,0,0,.32)}
    .card h2{margin:0 0 14px;font-size:28px}.rank-row{display:grid;grid-template-columns:70px 1fr 140px;gap:12px;align-items:center;padding:14px;border-radius:18px;margin:10px 0;background:#1e293b;transition:.25s}.rank-row:hover{transform:scale(1.01)}
    .rank-row.top1{background:linear-gradient(90deg,#facc15,#f97316);color:#422006;box-shadow:0 0 24px rgba(250,204,21,.6)}.rank-row.top2{background:linear-gradient(90deg,#e5e7eb,#94a3b8);color:#111827}.rank-row.top3{background:linear-gradient(90deg,#fb923c,#92400e);color:white}
    .medal{font-size:34px;font-weight:1000;text-align:center}.name{font-size:24px;font-weight:1000}.meta{font-size:14px;opacity:.82;margin-top:3px}.score{font-size:30px;font-weight:1000;text-align:right}.glow{animation:glow 1.4s ease-in-out infinite alternate}@keyframes glow{from{text-shadow:0 0 6px rgba(255,255,255,.25)}to{text-shadow:0 0 18px rgba(250,204,21,.9),0 0 28px rgba(249,115,22,.65)}}
    .small-row{display:grid;grid-template-columns:60px 1fr 100px;gap:10px;align-items:center;padding:12px;border-bottom:1px solid rgba(148,163,184,.16)}.small-row:nth-child(1) .score,.small-row:nth-child(2) .score,.small-row:nth-child(3) .score{color:#facc15;text-shadow:0 0 12px rgba(250,204,21,.6)}
    .error-row{display:grid;grid-template-columns:100px 1fr 100px;gap:10px;padding:11px;border-bottom:1px solid rgba(148,163,184,.16);align-items:center}.rate{font-weight:1000;color:#fca5a5;text-align:right}.empty{color:#94a3b8;padding:18px;text-align:center}.footer{margin-top:16px;color:#cbd5e1;text-align:center;font-size:14px}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.summary-card{background:rgba(30,41,59,.9);border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:16px;text-align:center}.summary-value{font-size:34px;font-weight:1000;color:#facc15}.summary-label{color:#cbd5e1;font-weight:700;margin-top:4px}.progressOuter{height:16px;background:#334155;border-radius:999px;overflow:hidden;margin-top:10px}.progressInner{height:100%;background:linear-gradient(90deg,#22c55e,#facc15);width:0%;transition:.4s}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modalBox{max-width:520px;width:100%;background:#0f172a;border:1px solid #475569;border-radius:24px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.45)}.modalBox h2{margin-top:0}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cancelBtn{border:0;border-radius:16px;padding:14px;font-weight:900;background:#334155;color:white}.dangerBtn{border:0;border-radius:16px;padding:14px;font-weight:900;background:#ef4444;color:white}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:1fr}.title{font-size:30px}.rank-row{grid-template-columns:54px 1fr 105px}.name{font-size:20px}.score{font-size:23px}.card h2{font-size:24px}}
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div>
      <div class="title">🏆 數列獵人｜教師戰情室 V3</div>
      <div class="subtitle">等差數列與等差級數｜RPG 學習競賽看板</div>
    </div>
    <div class="status">
      <div class="pill live">LIVE</div>
      <div class="pill">更新時間：<span id="updateTime">讀取中</span></div>
      <button class="refreshBtn" onclick="loadDashboard()">立即更新</button>
      <button class="backupBtn" onclick="openBackupModal()">📦 備份並清空</button>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card"><div class="summary-value" id="studentCount">0</div><div class="summary-label">參與學生</div></div>
    <div class="summary-card"><div class="summary-value" id="groupCount">0</div><div class="summary-label">參與小組</div></div>
    <div class="summary-card"><div class="summary-value" id="completeRate">0%</div><div class="summary-label">全班完成率</div><div class="progressOuter"><div class="progressInner" id="completeBar"></div></div></div>
  </div>

  <div class="grid">
    <section class="card"><h2>👥 小組排行榜</h2><div id="groupRank">讀取中...</div></section>
    <section class="card"><h2>👑 個人排行榜 TOP 10</h2><div id="personalRank">讀取中...</div></section>
    <section class="card" style="grid-column:1 / -1;"><h2>🧠 錯題／熱題分析</h2><div id="errorAnalysis">讀取中...</div></section>
  </div>
  <div class="footer">資料來源：Google Sheet × GAS｜每 5 秒自動更新一次｜備份功能只清空學生資料與學習紀錄，不會刪除題庫</div>
</div>

<div class="modal" id="backupModal">
  <div class="modalBox">
    <h2>📦 備份並清空本班資料</h2>
    <p>此動作會建立一個新的備份工作表，並清空目前的「學生資料」與「學習紀錄」。</p>
    <p><strong>題庫、排行榜公式、戰情室設定不會被刪除。</strong></p>
    <div class="modalActions">
      <button class="cancelBtn" onclick="closeBackupModal()">取消</button>
      <button class="dangerBtn" onclick="backupAndClear()" id="confirmBackupBtn">確定備份並清空</button>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzAbwvHv143MxKU3QBtH5wTVLLi3TnGH4Q431L066ATrBtcZFKDp5NKLbtAKkbmuPlT2g/exec';
const API_URL=GAS_URL+'?action=dashboard';
const BACKUP_URL=GAS_URL+'?action=backupAndClear';
const TOTAL_LEVELS=8;
function cleanRows(rows){return (rows||[]).filter(r=>r&&r.some(cell=>String(cell??'').trim()!==''));}
function medal(rank){if(rank==1)return '🥇'; if(rank==2)return '🥈'; if(rank==3)return '🥉'; return rank;}
function rankClass(i){if(i===0)return'top1'; if(i===1)return'top2'; if(i===2)return'top3'; return'';}
async function loadDashboard(){
  try{
    const res=await fetch(API_URL); const data=await res.json();
    const personal=cleanRows(data.personalRank); const groups=cleanRows(data.groupRank); const errors=cleanRows(data.errorAnalysis);
    document.getElementById('updateTime').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false});
    renderSummary(personal,groups); renderGroupRank(groups); renderPersonalRank(personal); renderErrorAnalysis(errors);
  }catch(err){document.getElementById('updateTime').textContent='讀取失敗';console.error(err)}
}
function renderSummary(personal,groups){
  document.getElementById('studentCount').textContent=personal.length;
  document.getElementById('groupCount').textContent=groups.length;
  const maxExp=TOTAL_LEVELS*10;
  const completed=personal.filter(r=>Number(r[5]||0)>=maxExp).length;
  const rate=personal.length?Math.round(completed/personal.length*100):0;
  document.getElementById('completeRate').textContent=rate+'%';
  document.getElementById('completeBar').style.width=rate+'%';
}
function renderGroupRank(rows){
  const box=document.getElementById('groupRank'); if(!rows.length){box.innerHTML='<div class="empty">尚無小組資料</div>';return;}
  box.innerHTML=rows.slice(0,10).map((r,i)=>{const rank=r[0]||i+1,group=r[1]||'未分組',exp=r[2]||0,count=r[3]||0;return `<div class="rank-row ${rankClass(i)}"><div class="medal">${medal(rank)}</div><div><div class="name">${group}</div><div class="meta">完成紀錄：${count}</div></div><div class="score glow">${exp} EXP</div></div>`}).join('');
}
function renderPersonalRank(rows){
  const box=document.getElementById('personalRank'); if(!rows.length){box.innerHTML='<div class="empty">尚無個人資料</div>';return;}
  box.innerHTML=rows.slice(0,10).map((r,i)=>{const rank=r[0]||i+1,className=r[1]||'',seatNo=r[2]||'',name=r[3]||'未命名',group=r[4]||'',exp=r[5]||0;return `<div class="small-row"><div class="medal">${medal(rank)}</div><div><div class="name">${name}</div><div class="meta">${className}｜${seatNo}號｜${group}</div></div><div class="score">${exp}</div></div>`}).join('');
}
function renderErrorAnalysis(rows){
  const box=document.getElementById('errorAnalysis'); if(!rows.length){box.innerHTML='<div class="empty">尚無答題分析資料</div>';return;}
  box.innerHTML=rows.slice(0,12).map(r=>{const level=r[0]||'',question=r[1]||'',total=r[2]||0;return `<div class="error-row"><div>${level}</div><div>${question}</div><div class="rate">${total} 次</div></div>`}).join('');
}
function openBackupModal(){document.getElementById('backupModal').style.display='flex'}
function closeBackupModal(){document.getElementById('backupModal').style.display='none'}
async function backupAndClear(){
  const btn=document.getElementById('confirmBackupBtn');
  btn.disabled=true; btn.textContent='備份中...';
  try{
    const res=await fetch(BACKUP_URL);
    const data=await res.json();
    if(data.status==='success'){
      alert('✅ 備份完成！\n建立工作表：'+data.backupSheetName+'\n目前資料已清空，可給下一班使用。');
      closeBackupModal();
      await loadDashboard();
    }else{alert('❌ 備份失敗：'+(data.message||'未知錯誤'));}
  }catch(err){console.error(err);alert('❌ 備份失敗，請確認 GAS 已重新部署。')}
  btn.disabled=false; btn.textContent='確定備份並清空';
}
loadDashboard(); setInterval(loadDashboard,5000);
</script>
</body>
</html>
